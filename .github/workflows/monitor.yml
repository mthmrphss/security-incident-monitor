name: "Security Incident Monitor"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Node.js 24'e erken geçiş (Node.js 20 deprecation uyarısını önler)
    # 2026-09-16'dan sonra Node.js 20 kaldırılacak
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/action_requirements.txt

      - name: Run scanner
        run: python scripts/main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_SEC_INCIDENT_API_KEY }}

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Incident Monitor Bot"
          git add data/
          git diff --staged --quiet || \
            git commit -m "update incidents $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
