nitter:
  # Nitter instance'ları sırayla denenir
  # Biri çalışmazsa diğerine geçer
  instances:
    - "https://nitter.net"

  # Her deneme arasında bekleme (saniye)
  retry_delay: 5

  # Maksimum deneme sayısı (instance başına)
  max_retries: 3

  # Takip edilecek hesaplar
  accounts:
    - handle: "ww3mediaa"
      category: "general"
      description: "World War 3 Media - conflict news"

    - handle: "BNONews"
      category: "general"
      description: "Breaking News alerts"

    - handle: "haskologlu"
      category: "general"
      description: "Breaking news alerts"

   
